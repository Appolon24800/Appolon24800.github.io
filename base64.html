<!DOCTYPE html><html><head> <title>Base64 Encoder/Decoder</title> <style>body{background-color: #222; color: #fff; font-family: Arial, sans-serif; text-align: center;}h1{text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);}.input-container{display: flex; justify-content: center; margin-top: 30px;}.input-container input{padding: 10px; font-size: 16px; border-radius: 4px; border: none; margin-right: 10px;}.button-container{margin-top: 20px;}.button-container button{padding: 10px 20px; font-size: 16px; border-radius: 4px; border: none; background-color: #4285F4; color: #fff; cursor: pointer; box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.4); transition: background-color 0.3s, transform 0.3s; animation-duration: 0.5s; animation-fill-mode: both;}.button-container button:hover{background-color: #3367D6; transform: scale(1.05);}.button-container button:active{background-color: #2A56B8; transform: scale(0.95);}.result-container{margin-top: 30px; white-space: pre-wrap;}p{padding: 10px; font-size: 16px; background-color: rgba(255, 255, 255, 0.2); border-radius: 4px; box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.4); word-break: break-all;}</style></head><body> <h1>Base64 Encoder/Decoder</h1> <div class="input-container"> <input type="text" id="inputString" placeholder="Enter a string"> </div><div class="button-container"> <button onclick="encodeString()">Encode</button> <button onclick="decodeString()">Decode</button> </div><div class="result-container"> <p id="encodedResult"></p><p id="decodedResult"></p></div><script>function encodeString(){var input=document.getElementById("inputString").value; var encodedString=btoa(input); document.getElementById("encodedResult").textContent=encodedString; document.getElementById("decodedResult").textContent="";}function decodeString(){var input=document.getElementById("inputString").value; var decodedString=atob(input); document.getElementById("decodedResult").textContent=decodedString; document.getElementById("encodedResult").textContent="";}</script></body></html>
